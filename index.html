<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>TikTok Style Feed</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* ===== Intro splash ===== */
    #intro {
      position:fixed;
      inset:0;
      background:#000;
      z-index:100;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#fff;
      transition:opacity .5s ease;
    }
    #intro.hidden { opacity:0; pointer-events:none; }
    #intro img {
      width:110px;
      height:110px;
      border-radius:26px;
      object-fit:cover;
      margin-bottom:16px;
      box-shadow:0 8px 30px rgba(255,255,255,0.08);
      animation:pulse 1.4s ease-in-out infinite;
    }
    #intro .intro-name { font-size:19px; font-weight:700; letter-spacing:0.5px; }
    #intro .intro-tap { margin-top:22px; font-size:12px; opacity:0.5; }
    #intro .intro-tap.pulse { animation:tapPulse 1.2s ease-in-out infinite; }
    @keyframes tapPulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }
    @keyframes pulse {
      0%,100% { transform:scale(1); }
      50% { transform:scale(1.06); }
    }

    /* ===== Sound toggle ===== */
    #soundToggle {
      position:fixed;
      right:12px;
      bottom:66px;
      width:38px;
      height:38px;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      z-index:20;
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(6px);
    }

    /* ===== Admin trigger ===== */
    #adminBtn {
      position:fixed;
      right:12px;
      bottom:18px;
      width:38px;
      height:38px;
      border-radius:50%;
      background:rgba(255,255,255,0.12);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:17px;
      z-index:20;
      border:1px solid rgba(255,255,255,0.2);
      backdrop-filter:blur(6px);
    }

    /* ===== Hamburger side panel ===== */
    #hamburgerBtn {
      position:fixed;
      left:12px;
      top:18px;
      width:40px;
      height:40px;
      z-index:30;
      background:rgba(0,0,0,0.4);
      backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,0.15);
      border-radius:12px;
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:4px;
      cursor:pointer;
      transition:0.2s;
      -webkit-tap-highlight-color:transparent;
    }
    #hamburgerBtn span {
      display:block;
      width:18px;
      height:2px;
      background:#fff;
      border-radius:2px;
      transition:0.2s;
    }
    #hamburgerBtn.active span:nth-child(1) { transform:rotate(45deg) translate(4px,4px); }
    #hamburgerBtn.active span:nth-child(2) { opacity:0; }
    #hamburgerBtn.active span:nth-child(3) { transform:rotate(-45deg) translate(4px,-4px); }

    #sidePanel {
      position:fixed;
      top:0;
      left:-280px;
      width:270px;
      max-width:75vw;
      height:100%;
      background:#111;
      z-index:35;
      transition:left 0.3s cubic-bezier(0.2,0.9,0.3,1);
      padding:60px 20px 24px;
      color:#eee;
      overflow-y:auto;
      border-right:1px solid #2a2a2a;
      box-shadow:4px 0 30px rgba(0,0,0,0.6);
    }
    #sidePanel.open { left:0; }
    #sidePanel .panel-logo {
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:24px;
      border-bottom:1px solid #2a2a2a;
      padding-bottom:16px;
    }
    #sidePanel .panel-logo img {
      width:44px;
      height:44px;
      border-radius:12px;
      object-fit:cover;
    }
    #sidePanel .panel-logo span {
      font-size:18px;
      font-weight:700;
    }
    #sidePanel .panel-item {
      padding:12px 10px;
      border-radius:10px;
      margin-bottom:4px;
      font-size:15px;
      display:flex;
      align-items:center;
      gap:14px;
      transition:background 0.15s;
      cursor:default;
    }
    #sidePanel .panel-item:hover { background:#1e1e1e; }
    #sidePanel .panel-item .icon { font-size:18px; width:24px; text-align:center; }
    #sidePanel .panel-footer {
      margin-top:30px;
      border-top:1px solid #2a2a2a;
      padding-top:16px;
      font-size:12px;
      color:#666;
    }

    #panelOverlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.5);
      z-index:32;
      opacity:0;
      pointer-events:none;
      transition:opacity 0.3s;
    }
    #panelOverlay.show { opacity:1; pointer-events:auto; }

    /* ===== PIN modal ===== */
    #pinModal, #adminModal {
      position:fixed;
      inset:0;
      z-index:50;
      background:rgba(0,0,0,0.92);
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      color:#fff;
    }
    #pinModal.show, #adminModal.show { display:flex; }
    #pinModal .pin-title { font-size:16px; font-weight:600; margin-bottom:18px; }
    #pinDots { display:flex; gap:14px; margin-bottom:26px; }
    #pinDots span {
      width:14px; height:14px; border-radius:50%;
      border:1px solid rgba(255,255,255,0.5);
      background:transparent;
    }
    #pinDots span.filled { background:#fff; }
    #pinDots.error span { border-color:#ff4d4f; }
    #pinPad {
      display:grid;
      grid-template-columns:repeat(3, 66px);
      gap:16px;
    }
    #pinPad button {
      width:66px; height:66px;
      border-radius:50%;
      background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);
      color:#fff;
      font-size:22px;
      -webkit-tap-highlight-color:transparent;
    }
    #pinPad button:active { background:rgba(255,255,255,0.25); }
    #pinCancel {
      margin-top:24px;
      font-size:13px;
      opacity:0.6;
      background:none;
      border:none;
      color:#fff;
    }

    /* ===== Admin dashboard ===== */
    #adminModal {
      background:#111;
      align-items:stretch;
      justify-content:flex-start;
      overflow-y:auto;
      padding-bottom:40px;
    }
    .admin-header {
      position:sticky;
      top:0;
      background:#111;
      padding:16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid #262626;
      z-index:2;
    }
    .admin-header h2 { font-size:17px; }
    .admin-header button {
      background:#ff2d55;
      color:#fff;
      border:none;
      padding:8px 14px;
      border-radius:8px;
      font-size:13px;
      font-weight:600;
    }
    .admin-section {
      padding:16px;
      border-bottom:8px solid #000;
    }
    .admin-section h3 {
      font-size:13px;
      text-transform:uppercase;
      letter-spacing:0.5px;
      color:#8a8a8a;
      margin-bottom:12px;
    }
    .logo-row { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
    .logo-row img {
      width:52px; height:52px; border-radius:12px; object-fit:cover;
      background:#222;
    }
    .file-btn, .text-input, .primary-btn, .ghost-btn {
      font-size:14px;
      border-radius:8px;
      border:1px solid #333;
      background:#1c1c1c;
      color:#fff;
      padding:9px 12px;
    }
    .file-btn { cursor:pointer; }
    .text-input { width:100%; margin-bottom:8px; }
    .primary-btn { background:#ff2d55; border:none; font-weight:600; }
    .ghost-btn { background:transparent; color:#ff4d4f; border:1px solid #442; }

    .video-card {
      background:#1a1a1a;
      border-radius:12px;
      padding:10px;
      display:flex;
      gap:10px;
      margin-bottom:10px;
    }
    .video-card img.thumb {
      width:64px; height:96px; object-fit:cover; border-radius:8px; flex-shrink:0; background:#000;
    }
    .video-card .fields { flex:1; min-width:0; }
    .video-card .fields input { width:100%; margin-bottom:6px; }
    .video-card .row-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:4px; }

    .add-video-box {
      background:#1a1a1a;
      border-radius:12px;
      padding:12px;
      margin-top:6px;
    }

    /* ===== Feed ===== */
    #feed {
      height:100vh;
      height:100dvh;
      width:100%;
      overflow-y:scroll;
      scroll-snap-type:y mandatory;
      -webkit-overflow-scrolling:touch;
      scrollbar-width:none;
    }
    #feed::-webkit-scrollbar { display:none; }

    .slide {
      position:relative;
      height:100vh;
      height:100dvh;
      width:100%;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      display:flex;
      align-items:center;
      justify-content:center;
      background:#000;
      overflow:hidden;
    }

    .video-wrap {
      position:relative;
      width:100%;
      height:100%;
    }

    .video-wrap iframe {
      position:absolute;
      top:50%;
      left:50%;
      width:100%;
      height:100%;
      min-height:100vh;
      min-height:100dvh;
      min-width:177.78vh;
      transform:translate(-50%,-50%);
      border:0;
      pointer-events:auto;
    }

    .overlay {
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      padding:16px 72px 26px 16px;
      background:linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0));
      color:#fff;
      pointer-events:none;
      z-index:2;
    }
    .overlay .count {
      font-size:13px;
      opacity:0.85;
      margin-bottom:4px;
    }
    .overlay .title {
      font-size:15px;
      font-weight:600;
      line-height:1.35;
    }

    .side-actions {
      position:absolute;
      right:10px;
      bottom:90px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:22px;
      z-index:2;
      color:#fff;
    }
    .side-actions .icon {
      width:44px;
      height:44px;
      border-radius:50%;
      background:rgba(255,255,255,0.15);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      backdrop-filter:blur(4px);
    }

    .topbar {
      position:fixed;
      top:0;
      left:0;
      right:0;
      padding:14px 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:24px;
      color:#fff;
      font-weight:600;
      font-size:15px;
      z-index:10;
      text-shadow:0 1px 3px rgba(0,0,0,0.6);
      pointer-events:none;
    }
    .topbar span.active {
      border-bottom:2px solid #fff;
      padding-bottom:6px;
    }
    .topbar #brandLogo {
      position:absolute;
      left:58px;
      width:30px;
      height:30px;
      border-radius:8px;
      object-fit:cover;
      display:none;
    }

    @media (min-width:600px) {
      #feed { max-width:480px; margin:0 auto; }
      .video-wrap iframe { min-width:100%; }
    }
  </style>
</head>
<body>

<!-- Intro splash -->
<div id="intro">
  <img id="introLogo" src="" alt="logo">

</div>

<!-- Top bar -->
<div class="topbar">
  <img id="brandLogo" src="" alt="logo">
  <span>Following</span><span class="active">For You</span>
</div>

<!-- Hamburger button -->
<button id="hamburgerBtn" aria-label="Menu">
  <span></span><span></span><span></span>
</button>

<!-- Side panel overlay -->
<div id="panelOverlay"></div>

<!-- Side panel -->
<div id="sidePanel">
  <div class="panel-logo">
    <img id="panelLogo" src="" alt="logo">
    <span id="panelAppName">My TikTok App</span>
  </div>

  <div class="panel-footer">v1.0 · TikTok clone</div>
</div>

<div id="feed"></div>

<button id="soundToggle" title="Sound">🔇</button>
<button id="adminBtn" title="Admin">⚙</button>

<!-- PIN modal -->
<div id="pinModal">
  <div class="pin-title">Enter Admin PIN</div>
  <div id="pinDots"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <div id="pinPad">
    <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
    <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
    <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
    <button data-k="clear">C</button><button data-k="0">0</button><button data-k="back">⌫</button>
  </div>
  <button id="pinCancel">Cancel</button>
</div>

<!-- Admin dashboard -->
<div id="adminModal">
  <div class="admin-header">
    <h2>Admin Dashboard</h2>
    <div style="display:flex; gap:8px;">
      <button id="adminSave">Save &amp; Close</button>
    </div>
  </div>

  <div class="admin-section">
    <h3>App Branding</h3>
    <div class="logo-row">
      <img id="logoPreview" src="" alt="">
      <div>
        <label class="file-btn">Upload topbar logo
          <input type="file" id="logoInput" accept="image/*" style="display:none;">
        </label>
      </div>
    </div>
  </div>

  <div class="admin-section">
    <h3>Intro Screen</h3>
    <div class="logo-row">
      <img id="introLogoPreview" src="" alt="">
      <div>
        <label class="file-btn">Upload intro logo
          <input type="file" id="introLogoInput" accept="image/*" style="display:none;">
        </label>
      </div>
    </div>
    <input class="text-input" id="introNameInput" type="text" placeholder="App name shown on intro screen">
  </div>

  <div class="admin-section">
    <h3>Videos (<span id="videoCount">0</span>)</h3>
    <div id="videoList"></div>

    <div class="add-video-box">
      <input class="text-input" id="newVideoUrl" type="text" placeholder="Paste YouTube URL or video ID">
      <input class="text-input" id="newVideoTitle" type="text" placeholder="Caption / title">
      <input class="text-input" id="newVideoCreator" type="text" placeholder="@creator name">
      <button class="primary-btn" id="addVideoBtn" style="width:100%;">+ Add Video</button>
    </div>
  </div>

  <div class="admin-section">
    <button class="ghost-btn" id="lockAdminBtn" style="width:100%;">Lock &amp; Exit Admin</button>
  </div>
</div>

<script>
  const ADMIN_PIN = "888967";
  const DEFAULT_LOGO = "data:image/svg+xml;utf8," + encodeURIComponent(

  // ===== App state =====
  const state = {

  function extractYouTubeId(input) {
    input = input.trim();
    const patterns = [
      /(?:youtu\.be\/|youtube\.com\/(?:embed\/|shorts\/|watch\?v=|watch\?.*&v=))([\w-]{6,15})/,
    ];
    for (const p of patterns) {
      const m = input.match(p);
      if (m) return m[1];
    }
    if (/^[\w-]{6,15}$/.test(input)) return input;
    return null;
  }

  // ===== Sound control =====
  let soundOn = true;      // start with sound ON
  let activeIframe = null;

  function sendYTCommand(iframe, func, args) {
    if (!iframe || !iframe.contentWindow) return;
    iframe.contentWindow.postMessage(JSON.stringify({ event:'command', func, args: args || [] }), '*');
  }
  function unmuteIframe(iframe) {
    if (!iframe) return;
    [150, 400, 800].forEach(delay => {
      setTimeout(() => {
        sendYTCommand(iframe, 'unMute');
        sendYTCommand(iframe, 'setVolume', [100]);
        sendYTCommand(iframe, 'playVideo');
      }, delay);
    });
  }
  function muteIframe(iframe) {
    if (!iframe) return;
    sendYTCommand(iframe, 'mute');
  }
  function updateSoundIcon() {
    document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  }
  function enableSound() {
    soundOn = true;
    updateSoundIcon();
    if (activeIframe) unmuteIframe(activeIframe);
  }

  document.getElementById('soundToggle').addEventListener('click', () => {
    soundOn = !soundOn;
    updateSoundIcon();
    if (soundOn) unmuteIframe(activeIframe);
    else muteIframe(activeIframe);
  });

  // ===== Rendering =====
  const feed = document.getElementById('feed');
  let observer;

  function renderFeed() {
    feed.innerHTML = "";
    state.videos.forEach((v, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `
        <div class="video-wrap">
          <iframe
            src="https://www.youtube.com/embed/${v.id}?playsinline=1&rel=0&modestbranding=1&enablejsapi=1"
            title="video ${i+1}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
        <div class="side-actions">
          <div class="icon">♥</div>
          <div class="icon">💬</div>
          <div class="icon">↗</div>
        </div>
        <div class="overlay">
          <div class="count">${i+1} / ${state.videos.length}</div>
          <div class="title">${v.creator || ''} · ${v.title || ''}</div>
        </div>
      `;
      feed.appendChild(slide);
    });

    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const iframe = entry.target.querySelector('iframe');
        if (!iframe) return;
        const src = iframe.getAttribute('src');
        if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
          activeIframe = iframe;
          if (src && !src.includes('autoplay=1')) {
            iframe.setAttribute('src', src + '&autoplay=1&mute=1');
          }
          if (soundOn) unmuteIframe(iframe);
        } else {
          if (src && src.includes('autoplay=1')) {
            iframe.setAttribute('src', src.replace('&autoplay=1&mute=1',''));
          }
        }
      });
    }, { root: feed, threshold: [0, 0.6, 1] });

    document.querySelectorAll('.slide').forEach(s => observer.observe(s));
  }

  function applyBranding() {
    const brandLogo = document.getElementById('brandLogo');
    if (state.logo) { brandLogo.src = state.logo; brandLogo.style.display = 'block'; }
    else { brandLogo.style.display = 'none'; }

    document.getElementById('introLogo').src = state.introLogo || DEFAULT_LOGO;
    document.getElementById('introName').textContent = state.appName || "My TikTok App";

    document.getElementById('logoPreview').src = state.logo || DEFAULT_LOGO;
    document.getElementById('introLogoPreview').src = state.introLogo || DEFAULT_LOGO;
    document.getElementById('introNameInput').value = state.appName;

    // side panel branding
    document.getElementById('panelLogo').src = state.logo || DEFAULT_LOGO;
    document.getElementById('panelAppName').textContent = state.appName || "My TikTok App";
  }

  // ===== Intro splash =====
  const intro = document.getElementById('intro');
  function dismissIntro() { intro.classList.add('hidden'); }
  intro.addEventListener('click', () => {
    enableSound();
    dismissIntro();
  });
  // Auto-dismiss after 2.5s (sound remains on)
  setTimeout(() => {
    dismissIntro();
    enableSound();
  }, 2500);

  // ===== Hamburger side panel =====
  const hamburgerBtn = document.getElementById('hamburgerBtn');
  const sidePanel = document.getElementById('sidePanel');
  const panelOverlay = document.getElementById('panelOverlay');

  function togglePanel(open) {
    const isOpen = sidePanel.classList.contains('open');
    if (open === undefined) {
      sidePanel.classList.toggle('open');
      panelOverlay.classList.toggle('show');
      hamburgerBtn.classList.toggle('active');
    } else if (open && !isOpen) {
      sidePanel.classList.add('open');
      panelOverlay.classList.add('show');
      hamburgerBtn.classList.add('active');
    } else if (!open && isOpen) {
      sidePanel.classList.remove('open');
      panelOverlay.classList.remove('show');
      hamburgerBtn.classList.remove('active');
    }
  }

  hamburgerBtn.addEventListener('click', () => togglePanel());
  panelOverlay.addEventListener('click', () => togglePanel(false));

  // ===== Admin: PIN login =====
  const pinModal = document.getElementById('pinModal');
  const adminModal = document.getElementById('adminModal');
  const pinDots = document.getElementById('pinDots');
  let pinEntry = "";

  function openPinModal() {
    pinEntry = "";
    updatePinDots();
    pinDots.classList.remove('error');
    pinModal.classList.add('show');
  }
  function updatePinDots() {
    [...pinDots.children].forEach((dot, i) => {
      dot.classList.toggle('filled', i < pinEntry.length);
    });
  }
  document.getElementById('adminBtn').addEventListener('click', openPinModal);
  document.getElementById('pinCancel').addEventListener('click', () => pinModal.classList.remove('show'));

  document.getElementById('pinPad').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const k = btn.dataset.k;
    if (k === 'clear') { pinEntry = ""; }
    else if (k === 'back') { pinEntry = pinEntry.slice(0, -1); }
    else if (pinEntry.length < 6) { pinEntry += k; }
    updatePinDots();

    if (pinEntry.length === 6) {
      if (pinEntry === ADMIN_PIN) {
        setTimeout(() => {
          pinModal.classList.remove('show');
          openAdmin();
        }, 150);
      } else {
        pinDots.classList.add('error');
        setTimeout(() => { pinEntry = ""; updatePinDots(); pinDots.classList.remove('error'); }, 500);
      }
    }
  });

  // ===== Admin dashboard =====
  function openAdmin() {
    applyBranding();
    renderVideoList();
    adminModal.classList.add('show');
  }
  function closeAdmin() { adminModal.classList.remove('show'); }

  document.getElementById('lockAdminBtn').addEventListener('click', closeAdmin);
  document.getElementById('adminSave').addEventListener('click', () => {
    state.appName = document.getElementById('introNameInput').value.trim() || "My TikTok App";
    applyBranding();
    renderFeed();
    closeAdmin();
  });

  function readFileAsDataUrl(file, cb) {
    const reader = new FileReader();
    reader.onload = () => cb(reader.result);
    reader.readAsDataURL(file);
  }

  document.getElementById('logoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readFileAsDataUrl(file, (dataUrl) => {
      state.logo = dataUrl;
      applyBranding();
    });
  });

  document.getElementById('introLogoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readFileAsDataUrl(file, (dataUrl) => {
      state.introLogo = dataUrl;
      applyBranding();
    });
  });

  function renderVideoList() {
    const list = document.getElementById('videoList');
    document.getElementById('videoCount').textContent = state.videos.length;
    list.innerHTML = "";
    state.videos.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <img class="thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="">
        <div class="fields">
          <input class="text-input" data-field="id" type="text" value="${v.id}" placeholder="YouTube ID">
          <input class="text-input" data-field="title" type="text" value="${v.title||''}" placeholder="Title">
          <input class="text-input" data-field="creator" type="text" value="${v.creator||''}" placeholder="@creator">
          <div class="row-actions">
            <button class="ghost-btn" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      card.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          const field = inp.dataset.field;
          state.videos[i][field] = inp.value;
          if (field === 'id') card.querySelector('.thumb').src = `https://img.youtube.com/vi/${inp.value}/mqdefault.jpg`;
        });
      });
      card.querySelector('[data-action="delete"]').addEventListener('click', () => {
        state.videos.splice(i, 1);
        renderVideoList();
      });
      list.appendChild(card);
    });
  }

  document.getElementById('addVideoBtn').addEventListener('click', () => {
    const urlInput = document.getElementById('newVideoUrl');
    const titleInput = document.getElementById('newVideoTitle');
    const creatorInput = document.getElementById('newVideoCreator');
    const id = extractYouTubeId(urlInput.value);
    if (!id) { urlInput.style.borderColor = '#ff4d4f'; return; }
    urlInput.style.borderColor = '#333';
    state.videos.push({ id, title: titleInput.value.trim(), creator: creatorInput.value.trim() });
    urlInput.value = ""; titleInput.value = ""; creatorInput.value = "";
    renderVideoList();
  });

  // ===== Init =====
  applyBranding();
  renderFeed();
  updateSoundIcon();

  // Sound starts ON — unmute the first active iframe after a tiny delay
  setTimeout(() => {
    if (activeIframe) unmuteIframe(activeIframe);
  }, 600);
</script>
</body>
</html>
