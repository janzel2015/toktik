  @keyframes pulse {
    0%,100% { transform:scale(1); }
    50% { transform:scale(1.06); }
  }

  #soundToggle {
    position:fixed;
    right:12px;

    justify-content:center;

    z-index:20;

    backdrop-filter:blur(6px);
  }

  /* ===== Admin trigger ===== */
  #adminBtn {
    position:fixed;
    right:12px;
    bottom:18px;
    width:38px;
    height:38px;
    border-radius:50%;
    background:rgba(255,255,255,0.12);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:17px;
    z-index:20;
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(6px);
  }

  /* ===== PIN modal ===== */
  #pinModal, #adminModal {

    inset:0;
    z-index:50;
    background:rgba(0,0,0,0.92);

    flex-direction:column;
    align-items:center;
    justify-content:center;

  #pinPad button {

    color:#fff;

  #pinCancel {

  #feed {

  // Enhanced state with fake engagement metrics
  const state = {
    appName: "Viral Vibes",
    logo: "",      
    introLogo: "", 
    videos: [
      { id:"dQw4w9WgXcQ", title:"Never gonna give you up", creator:"@rickastley", likes: "12.4K", comments: "892" },
      { id:"9bZkp7q19f0", title:"Gangnam Style", creator:"@psy", likes: "45.2K", comments: "2.1K" },
      { id:"kJQP7kiw5Fk", title:"Despacito", creator:"@luisfonsi", likes: "28.7K", comments: "1.4K" },
      { id:"JGwWNGJdvx8", title:"Shape of You", creator:"@edsheeran", likes: "19.8K", comments: "765" },
      { id:"RgKAFK5djSk", title:"See You Again", creator:"@wizkhalifa", likes: "33.1K", comments: "1.8K" },
      // ... (rest of videos with added likes/comments)
      { id:"OPf0YbXqDm0", title:"Uptown Funk", creator:"@markronson", likes: "24.5K", comments: "980" },
      { id:"fJ9rUzIMcZQ", title:"Bohemian Rhapsody", creator:"@queen", likes: "41.2K", comments: "3.2K" },
      { id:"YQHsXMglC9A", title:"Hello", creator:"@adele", likes: "15.9K", comments: "642" },
      { id:"CevxZvSJLk8", title:"Roar", creator:"@katyperry", likes: "22.3K", comments: "1.1K" },
      { id:"hT_nvWreIhg", title:"Counting Stars", creator:"@onerepublic", likes: "18.7K", comments: "734" },
    ]
  };

  function extractYouTubeId(input) {
    input = input.trim();
    const patterns = [
      /(?:youtu\.be\/|youtube\.com\/(?:embed\/|shorts\/|watch\?v=|watch\?.*&v=))([\w-]{6,15})/,
    ];
    for (const p of patterns) {
      const m = input.match(p);
      if (m) return m[1];
    }
    if (/^[\w-]{6,15}$/.test(input)) return input;
    return null;
  }

  // ===== Sound control =====
  let soundOn = false;
  let activeIframe = null;

  function sendYTCommand(iframe, func, args) {
    if (!iframe || !iframe.contentWindow) return;
    iframe.contentWindow.postMessage(JSON.stringify({ event:'command', func, args: args || [] }), '*');
  }

  function unmuteIframe(iframe) {
    if (!iframe) return;
    [150, 400, 800].forEach(delay => {
      setTimeout(() => {
        sendYTCommand(iframe, 'unMute');
        sendYTCommand(iframe, 'setVolume', [100]);
        sendYTCommand(iframe, 'playVideo');
      }, delay);
    });
  }

  function muteIframe(iframe) {
    if (!iframe) return;
    sendYTCommand(iframe, 'mute');
  }

  function updateSoundIcon() {
    document.getElementById('soundToggle').textContent = soundOn ? '🔊' : '🔇';
  }

  function enableSound() {
    soundOn = true;
    updateSoundIcon();
    if (activeIframe) unmuteIframe(activeIframe);
  }

  document.getElementById('soundToggle').addEventListener('click', () => {
    soundOn = !soundOn;
    updateSoundIcon();
    if (soundOn && activeIframe) unmuteIframe(activeIframe);
    else if (!soundOn && activeIframe) muteIframe(activeIframe);
  });

  // ===== Fake engagement =====
  function showCommentToast() {
    const toast = document.getElementById('commentToast');
    const messages = [
      "This song is stuck in my head 🔥",
      "The transition tho 👏",
      "POV: me at 3am",
      "Underrated gem 💎",
      "Can't stop watching"
    ];
    toast.textContent = messages[Math.floor(Math.random()*messages.length)];
    toast.style.opacity = 1;
    toast.style.transform = 'translateX(-50%) translateY(-10px)';
    setTimeout(() => {
      toast.style.opacity = 0;
      toast.style.transform = 'translateX(-50%)';
    }, 2200);
  }

  // ===== Rendering =====
  const feed = document.getElementById('feed');
  let observer;

  function renderFeed() {
    feed.innerHTML = "";
    state.videos.forEach((v, i) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `
        <div class="video-wrap">
          <iframe
            src="https://www.youtube.com/embed/${v.id}?playsinline=1&rel=0&modestbranding=1&enablejsapi=1"
            title="video ${i+1}"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen
            loading="lazy">
          </iframe>
        </div>
        <div class="side-actions">
          <div class="icon like-btn" data-index="${i}">♥</div>
          <div class="count">${v.likes}</div>
          
          <div class="icon comment-btn" data-index="${i}">💬</div>
          <div class="count">${v.comments}</div>
          
          <div class="icon share-btn" data-index="${i}">↗</div>
        </div>
        <div class="overlay">
          <div class="count">${i+1} / ${state.videos.length}</div>
          <div class="title">${v.creator || ''} · ${v.title || ''}</div>
        </div>
      `;
      feed.appendChild(slide);

      // Double tap to like on video area
      const videoWrap = slide.querySelector('.video-wrap');
      let lastTap = 0;
      videoWrap.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTap < 300) {
          const heart = slide.querySelector('.like-btn');
          heart.classList.add('liked');
          setTimeout(() => heart.classList.remove('liked'), 800);
        }
        lastTap = now;
      });
    });

    if (observer) observer.disconnect();
    observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const iframe = entry.target.querySelector('iframe');
        if (!iframe) return;
        const src = iframe.getAttribute('src');
        if (entry.isIntersecting && entry.intersectionRatio > 0.6) {
          activeIframe = iframe;
          if (src && !src.includes('autoplay=1')) {
            iframe.setAttribute('src', src + '&autoplay=1&mute=1');
          }
          if (soundOn) unmuteIframe(iframe);
        } else if (src && src.includes('autoplay=1')) {
          iframe.setAttribute('src', src.replace('&autoplay=1&mute=1',''));
        }
      });
    }, { root: feed, threshold: [0, 0.6, 1] });

    document.querySelectorAll('.slide').forEach(s => observer.observe(s));

    // Attach side action listeners
    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('liked');
        if (btn.classList.contains('liked')) {
          // Fake increment
          const countEl = btn.parentElement.querySelector('.count');
          let num = parseFloat(countEl.textContent);
          countEl.textContent = (num + 0.1).toFixed(1) + "K";
        }
      });
    });

    document.querySelectorAll('.comment-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showCommentToast();
      });
    });

    document.querySelectorAll('.share-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const toast = document.getElementById('commentToast');
        toast.textContent = "Link copied! 📋";
        toast.style.opacity = 1;
        setTimeout(() => toast.style.opacity = 0, 1800);
      });
    });
  }

  function applyBranding() {
    const brandLogo = document.getElementById('brandLogo');
    if (state.logo) { 
      brandLogo.src = state.logo; 
      brandLogo.style.display = 'block'; 
    } else { 
      brandLogo.style.display = 'none'; 
    }

    document.getElementById('introLogo').src = state.introLogo || DEFAULT_LOGO;
    document.getElementById('introName').textContent = state.appName || "Viral Vibes";

    document.getElementById('logoPreview').src = state.logo || DEFAULT_LOGO;
    document.getElementById('introLogoPreview').src = state.introLogo || DEFAULT_LOGO;
    document.getElementById('introNameInput').value = state.appName;
  }

  // ===== Intro splash =====
  const intro = document.getElementById('intro');
  function dismissIntro() { intro.classList.add('hidden'); }
  intro.addEventListener('click', () => {
    enableSound();
    dismissIntro();
  });
  setTimeout(dismissIntro, 3500);

  // ===== Admin: PIN login =====
  const pinModal = document.getElementById('pinModal');
  const adminModal = document.getElementById('adminModal');
  const pinDots = document.getElementById('pinDots');
  let pinEntry = "";

  function openPinModal() {
    pinEntry = "";
    updatePinDots();
    pinDots.classList.remove('error');
    pinModal.classList.add('show');
  }
  function updatePinDots() {
    [...pinDots.children].forEach((dot, i) => {
      dot.classList.toggle('filled', i < pinEntry.length);
    });
  }
  document.getElementById('adminBtn').addEventListener('click', openPinModal);
  document.getElementById('pinCancel').addEventListener('click', () => pinModal.classList.remove('show'));

  document.getElementById('pinPad').addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const k = btn.dataset.k;
    if (k === 'clear') { pinEntry = ""; }
    else if (k === 'back') { pinEntry = pinEntry.slice(0, -1); }
    else if (pinEntry.length < 6) { pinEntry += k; }
    updatePinDots();

    if (pinEntry.length === 6) {
      if (pinEntry === ADMIN_PIN) {
        setTimeout(() => {
          pinModal.classList.remove('show');
          openAdmin();
        }, 150);
      } else {
        pinDots.classList.add('error');
        setTimeout(() => { pinEntry = ""; updatePinDots(); pinDots.classList.remove('error'); }, 500);
      }
    }
  });

  // ===== Admin dashboard =====
  function openAdmin() {
    applyBranding();
    renderVideoList();
    adminModal.classList.add('show');
  }
  function closeAdmin() { adminModal.classList.remove('show'); }

  document.getElementById('lockAdminBtn').addEventListener('click', closeAdmin);
  document.getElementById('adminSave').addEventListener('click', () => {
    state.appName = document.getElementById('introNameInput').value.trim() || "Viral Vibes";
    applyBranding();
    renderFeed();
    closeAdmin();
  });

  function readFileAsDataUrl(file, cb) {
    const reader = new FileReader();
    reader.onload = () => cb(reader.result);
    reader.readAsDataURL(file);
  }

  document.getElementById('logoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readFileAsDataUrl(file, (dataUrl) => {
      state.logo = dataUrl;
      applyBranding();
    });
  });

  document.getElementById('introLogoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    readFileAsDataUrl(file, (dataUrl) => {
      state.introLogo = dataUrl;
      applyBranding();
    });
  });

  function renderVideoList() {
    const list = document.getElementById('videoList');
    document.getElementById('videoCount').textContent = state.videos.length;
    list.innerHTML = "";
    state.videos.forEach((v, i) => {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.innerHTML = `
        <img class="thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" alt="">
        <div class="fields">
          <input class="text-input" data-field="id" type="text" value="${v.id}" placeholder="YouTube ID">
          <input class="text-input" data-field="title" type="text" value="${v.title||''}" placeholder="Title">
          <input class="text-input" data-field="creator" type="text" value="${v.creator||''}" placeholder="@creator">
          <div class="row-actions">
            <button class="ghost-btn" data-action="delete">Delete</button>
          </div>
        </div>
      `;
      card.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          const field = inp.dataset.field;
          state.videos[i][field] = inp.value;
          if (field === 'id') card.querySelector('.thumb').src = `https://img.youtube.com/vi/${inp.value}/mqdefault.jpg`;
        });
      });
      card.querySelector('[data-action="delete"]').addEventListener('click', () => {
        state.videos.splice(i, 1);
        renderVideoList();
      });
      list.appendChild(card);
    });
  }

  document.getElementById('addVideoBtn').addEventListener('click', () => {
    const urlInput = document.getElementById('newVideoUrl');
    const titleInput = document.getElementById('newVideoTitle');
    const creatorInput = document.getElementById('newVideoCreator');
    const id = extractYouTubeId(urlInput.value);
    if (!id) { 
      urlInput.style.borderColor = '#ff4d4f'; 
      return; 
    }
    urlInput.style.borderColor = '#333';
    state.videos.push({ 
      id, 
      title: titleInput.value.trim(), 
      creator: creatorInput.value.trim() || "@user",
      likes: (Math.random()*30 + 5).toFixed(1) + "K",
      comments: Math.floor(Math.random()*2500 + 200) + ""
    });
    urlInput.value = ""; titleInput.value = ""; creatorInput.value = "";
    renderVideoList();
  });

  // ===== Init =====
  applyBranding();
  renderFeed();
  updateSoundIcon();
</script>
</body>
</html>
